[response_codes]
# Relative weights for response code sampling.
noerror = 980
nxdomain = 17
servfail = 3

[response_delay]
# All latency ranges are expressed in microseconds.
unit = "us"

[response_delay.normal]
# share_per_mille is the bucket share out of 1000.
buckets = [
  { name = "very_fast", share_per_mille = 733, range_us = [8, 24], note = "Main mass of successful replies" },
  { name = "fast", share_per_mille = 221, range_us = [25, 34], note = "Secondary fast-path bucket" },
  { name = "warm", share_per_mille = 28, range_us = [35, 49], note = "Small near-tail bucket" },
  { name = "slow", share_per_mille = 7, range_us = [50, 149], note = "Rare but still normal replies" },
  { name = "tail", share_per_mille = 1, range_us = [150, 999], note = "Very rare short tail" },
  { name = "long_tail", share_per_mille = 2, range_us = [1000, 49999], note = "Rare multi-millisecond replies" },
  { name = "extreme_tail", share_per_mille = 8, range_us = [50000, 180000], note = "Long outliers kept to match the observed tail" },
]

[response_delay.servfail]
# ServFail has a heavier long-tail than normal responses.
buckets = [
  { name = "very_fast", share_per_mille = 739, range_us = [12, 59], note = "Main mass of ServFail replies" },
  { name = "fast", share_per_mille = 19, range_us = [60, 999], note = "Short tail for ServFail" },
  { name = "mid_tail", share_per_mille = 8, range_us = [1000, 49999], note = "Mid tail for slower failures" },
  { name = "long_tail", share_per_mille = 40, range_us = [50000, 200000], note = "Long failure tail" },
  { name = "very_long", share_per_mille = 155, range_us = [200000, 800000], note = "Heavy tail from degraded failures" },
  { name = "extreme_tail", share_per_mille = 39, range_us = [800000, 1200000], note = "Extreme outliers" },
]

[retry_delay]
# Each range defines the uniform sampling window for one retry step.
answered_ranges_us = [
  [250, 900],       # First retry after an answered query
  [900, 2200],      # Second retry after an answered query
  [2200, 6000],     # Third retry after an answered query
]

unanswered_ranges_us = [
  [70000, 140000],  # First retry after an unanswered query
  [180000, 320000], # Second retry after an unanswered query
  [450000, 900000], # Third retry after an unanswered query
]
